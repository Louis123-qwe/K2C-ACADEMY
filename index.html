<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ask Digital Nathy | K2Ç Academy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap');

  :root {
    --purple: #2D1B69;
    --yellow: #FFD700;
    --orange: #FF6B35;
    --teal: #0B6E4F;
    --coral: #FF4D6D;
    --dark: #0D1B2A;
    --charcoal: #1A1A2E;
    --light: #F7F7F7;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--charcoal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--white);
  }

  /* HEADER */
  header {
    background: var(--purple);
    border-bottom: 2px solid var(--yellow);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-badge {
    background: var(--yellow);
    color: var(--purple);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 1px;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .logo-text p {
    font-size: 10px;
    color: var(--yellow);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .header-tag {
    background: rgba(255,215,0,0.15);
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* HERO SECTION */
  .hero {
    background: linear-gradient(135deg, var(--purple) 0%, var(--dark) 100%);
    padding: 40px 24px 30px;
    text-align: center;
    border-bottom: 1px solid rgba(255,215,0,0.2);
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: -30px;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, rgba(11,110,79,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }

  .avatar {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--teal), var(--purple));
    border-radius: 50%;
    border: 3px solid var(--yellow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 16px;
    position: relative;
    z-index: 1;
  }

  .online-dot {
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 14px;
    height: 14px;
    background: #39FF14;
    border-radius: 50%;
    border: 2px solid var(--charcoal);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.2); }
  }

  .hero h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .hero h2 span { color: var(--yellow); }

  .hero p {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    max-width: 320px;
    margin: 0 auto 20px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  /* QUICK TOPICS */
  .quick-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .topic-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .topic-btn:hover, .topic-btn:active {
    background: var(--yellow);
    color: var(--purple);
    border-color: var(--yellow);
    transform: translateY(-1px);
  }

  /* CHAT AREA */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
  }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.nathy {
    background: linear-gradient(135deg, var(--purple), var(--teal));
    border: 2px solid var(--yellow);
  }

  .msg-avatar.user-av {
    background: var(--orange);
    font-size: 13px;
    font-weight: 700;
    color: white;
    font-family: 'Poppins', sans-serif;
  }

  .msg-bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.7;
    position: relative;
  }

  .message.nathy .msg-bubble {
    background: linear-gradient(135deg, #1e1248, #0f2333);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 4px 18px 18px 18px;
    color: rgba(255,255,255,0.92);
  }

  .message.user .msg-bubble {
    background: linear-gradient(135deg, var(--teal), #0a5a40);
    border-radius: 18px 4px 18px 18px;
    color: var(--white);
  }

  .msg-name {
    font-size: 10px;
    font-weight: 600;
    color: var(--yellow);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .msg-bubble strong { color: var(--yellow); }
  .msg-bubble em { color: rgba(255,215,0,0.8); font-style: normal; }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--yellow);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* INPUT AREA */
  .input-area {
    background: var(--dark);
    border-top: 1px solid rgba(255,215,0,0.15);
    padding: 14px 16px;
    position: sticky;
    bottom: 0;
  }

  .input-wrapper {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,215,0,0.25);
    border-radius: 14px;
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-size: 13.5px;
    padding: 11px 16px;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: rgba(255,255,255,0.35); }
  textarea:focus { border-color: var(--yellow); }

  .send-btn {
    background: var(--yellow);
    border: none;
    border-radius: 12px;
    width: 46px;
    height: 46px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--orange); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 20px; height: 20px; fill: var(--purple); }

  .input-hint {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 8px;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
  }

  /* CTA CARD */
  .cta-card {
    background: linear-gradient(135deg, var(--purple), var(--dark));
    border: 1.5px solid var(--yellow);
    border-radius: 14px;
    padding: 16px;
    margin-top: 8px;
  }

  .cta-card h4 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1.5px;
    color: var(--yellow);
    margin-bottom: 6px;
  }

  .cta-card p {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .cta-card a {
    display: inline-block;
    background: var(--yellow);
    color: var(--purple);
    font-weight: 700;
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 8px;
    text-decoration: none;
    letter-spacing: 0.5px;
  }

  /* SCROLLBAR */
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 2px; }

  /* ERROR */
  .error-bubble {
    background: rgba(255,77,109,0.15);
    border: 1px solid var(--coral);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--coral);
    text-align: center;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-badge">K2Ç</div>
    <div class="logo-text">
      <h1>K2Ç ACADEMY</h1>
      <p>KNOWLEDGE TO CASH</p>
    </div>
  </div>
  <div class="header-tag">ASK NATHY AI</div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="avatar">
    🎓
    <div class="online-dot"></div>
  </div>
  <h2>ASK <span>DIGITAL NATHY</span></h2>
  <p>Get instant answers about the course, K2Ç Academy and how to start earning from what you know.</p>
  <div class="quick-topics">
    <button class="topic-btn" onclick="askTopic('Who is Digital Nathy?')">👤 Who is Nathy?</button>
    <button class="topic-btn" onclick="askTopic('What is the Zero to First Online Sale System course about?')">🎓 The Course</button>
    <button class="topic-btn" onclick="askTopic('How much does the course cost and what do I get?')">💰 Pricing</button>
    <button class="topic-btn" onclick="askTopic('What will I be able to do after completing this course?')">🏆 Results</button>
    <button class="topic-btn" onclick="askTopic('Is this course right for a complete beginner with no experience?')">🌱 Beginners</button>
    <button class="topic-btn" onclick="askTopic('What bonuses come with the course?')">🎁 Bonuses</button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-container" id="chatContainer"></div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="userInput"
      placeholder="Ask anything about Digital Nathy, K2Ç Academy or the course..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Powered by K2Ç Academy AI · Responses are based on Digital Nathy's real story and course content</p>
</div>

<script>
const SYSTEM_PROMPT = `You are the Digital Nathy AI assistant for K2Ç Academy. You speak in Digital Nathy's voice — warm, direct, like a knowledgeable big brother who has been where the visitor is and found a way out. You are confident, honest and practical. You never hype or exaggerate.

Here is everything you know:

ABOUT DIGITAL NATHY:
- Full name: Oniah Emmanuel (known online as Digital Nathy)
- Nigerian digital marketing strategist, coach and founder of K2Ç Academy
- His journey: Started as a university student trying to ease financial burden on his parents. Attended multiple trainings — copywriting with Boss Woozy, graphic design, affiliate marketing — but earned nothing. His first online class had 200 attendees and zero sales. A student coached him in front of everyone on how to run a class properly — which embarrassed him but taught him that authenticity sells. He was copy-pasting from his mentor without understanding. After attending John Obidi's Design the Decade program, he gained clarity and built K2Ç Academy from the insight that thousands of people have knowledge but no system to earn from it.
- He has made real sales: Selar payouts, Amazon KDP royalties, affiliate commissions including international sales in CFA currency from Cameroon.
- Personal philosophy: Impact over income. Execution over theory. Integrity over hype. Small wins lead to big breakthroughs.
- Communication style: Big brother meets strategist. Warm and relatable but structured and practical.

ABOUT K2Ç ACADEMY:
- K2Ç stands for Knowledge to Cash
- Tagline: From Knowledge to Cash — Stop Learning. Start Earning.
- Mission: Help beginners — especially in Nigeria — move from confusion and information overload to clarity, execution and their first real online income.
- Positioning: No-hype, results-driven, beginner-friendly, execution-first. Deliberately different from scam-adjacent online income content common in the Nigerian space.
- Platforms: WhatsApp, TikTok, Facebook
- Handle: @digitalnathy

ABOUT THE COURSE:
- Full name: The Zero to First Online Sale System
- Price: ₦9,997 Early Bird (first 20 students). Rises to ₦15,000 after.
- Format: 15 video lessons across 7 modules, screen-recorded, self-paced
- Delivery: Selar.co
- Target: Beginners in Nigeria with knowledge/skills but no system to monetize them

MODULES:
- Module 0: Welcome — mindset, expectations, how to use the course
- Module 1: The Knowledge Audit — discover what you already have that people will pay for
- Module 2: The Clarity Blueprint — escape information overload, pick one path
- Module 3: Your First Digital Product — create and list a product in 48 hours using free tools
- Module 4: Your Sales System — WhatsApp Sales Machine, Facebook and TikTok captions
- Module 5: Your First Sale Blueprint — 7-day launch plan, follow-up strategy
- Module 6: Scale and Sustain — testimonials, multiple income streams, 30-day growth plan

BONUSES (all free with the course):
1. The Quick Start Action Guide
2. The Knowledge Audit Worksheet
3. The Done-For-You Swipe File (30 captions, scripts, DM templates)
4. The 30-Day Content and Action Calendar
5. Lifetime access to the private K2Ç Academy WhatsApp community with weekly Q&A
6. Personal Product Review from Digital Nathy (first 15 students only)
7. The WhatsApp Sales Conversation Guide (objection handling, DM scripts)
Total bonus value: over ₦50,000

STUDENT JOURNEY (6 stages):
1. Seedling — just joined
2. Learner — watching and applying
3. Builder — product created, Selar store live
4. Earner — first sale made
5. Advocate — sharing results, earning affiliate commissions (25% per referral)
6. Ambassador — Certified K2Ç Coach, runs bootcamps under the brand, earns 80% revenue

TOOLS USED IN COURSE: Google Docs, Canva, Google Slides, phone screen recorder, Capcut, Selar.co — all free.

HOW TO ANSWER:
- Be warm, direct and conversational. Never robotic.
- Keep answers focused and practical — 3 to 6 sentences for simple questions, slightly longer for complex ones.
- Use line breaks to keep things readable on mobile.
- If someone asks about buying, direct them to get the course on Selar.
- If someone seems unsure, ask them one question to understand their situation better.
- Never make up information. If you do not know something, say so honestly.
- Always end responses with either a helpful next step, a question or encouragement.
- Do not use bullet points unless listing multiple items. Prefer natural flowing sentences.`;

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function askTopic(question) {
  document.getElementById('userInput').value = question;
  sendMessage();
}

function addMessage(role, content, isError = false) {
  const container = document.getElementById('chatContainer');

  if (isError) {
    const div = document.createElement('div');
    div.className = 'error-bubble';
    div.textContent = content;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return;
  }

  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${role}`;

  const avatarDiv = document.createElement('div');
  avatarDiv.className = `msg-avatar ${role === 'nathy' ? 'nathy' : 'user-av'}`;
  avatarDiv.textContent = role === 'nathy' ? '🎓' : 'YOU';

  const bubbleDiv = document.createElement('div');
  bubbleDiv.className = 'msg-bubble';

  if (role === 'nathy') {
    const nameDiv = document.createElement('div');
    nameDiv.className = 'msg-name';
    nameDiv.textContent = 'DIGITAL NATHY';
    bubbleDiv.appendChild(nameDiv);
  }

  const textDiv = document.createElement('div');
  textDiv.innerHTML = formatMessage(content);
  bubbleDiv.appendChild(textDiv);

  msgDiv.appendChild(avatarDiv);
  msgDiv.appendChild(bubbleDiv);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function formatMessage(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');
}

function showTyping() {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'message nathy';
  div.id = 'typingIndicator';

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar nathy';
  avatarDiv.textContent = '🎓';

  const bubbleDiv = document.createElement('div');
  bubbleDiv.className = 'msg-bubble';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  bubbleDiv.appendChild(typing);
  div.appendChild(avatarDiv);
  div.appendChild(bubbleDiv);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const indicator = document.getElementById('typingIndicator');
  if (indicator) indicator.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();

  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0] && data.content[0].text) {
      const reply = data.content[0].text;
      messages.push({ role: 'assistant', content: reply });
      addMessage('nathy', reply);

      // Show CTA after 3 exchanges
      if (messages.length >= 6 && messages.length % 6 === 0) {
        showCTA();
      }
    } else {
      addMessage('nathy', "I am having a moment — please try asking again. 🙏", false);
    }
  } catch (err) {
    removeTyping();
    addMessage('', 'Something went wrong. Please check your connection and try again.', true);
  }

  isLoading = false;
  sendBtn.disabled = false;
  input.focus();
}

function showCTA() {
  const container = document.getElementById('chatContainer');
  const card = document.createElement('div');
  card.className = 'cta-card';
  card.innerHTML = `
    <h4>READY TO GET STARTED?</h4>
    <p>Join the Zero to First Online Sale System — ₦9,997 Early Bird. First 20 students only.</p>
    <a href="https://selar.co/digitalnathy" target="_blank">GET INSTANT ACCESS →</a>
  `;
  container.appendChild(card);
  container.scrollTop = container.scrollHeight;
}

// Welcome message on load
window.addEventListener('load', () => {
  setTimeout(() => {
    const welcome = `Hey! Welcome to K2Ç Academy. 👋\n\nI am the Digital Nathy AI — here to answer any question you have about the course, K2Ç Academy or how to start earning online from what you already know.\n\nWhat would you like to know?`;
    addMessage('nathy', welcome);
    messages.push({ role: 'assistant', content: welcome });
  }, 600);
});
</script>
</body>
</html>
