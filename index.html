<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ask Digital Nathy | K2Ç Academy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap');

  :root {
    --purple: #2D1B69;
    --yellow: #FFD700;
    --orange: #FF6B35;
    --teal: #0B6E4F;
    --coral: #FF4D6D;
    --dark: #0D1B2A;
    --charcoal: #1A1A2E;
    --light: #F7F7F7;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--charcoal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--white);
  }

  /* HEADER */
  header {
    background: var(--purple);
    border-bottom: 2px solid var(--yellow);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-badge {
    background: var(--yellow);
    color: var(--purple);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 1px;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }

  .logo-text p {
    font-size: 10px;
    color: var(--yellow);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .header-tag {
    background: rgba(255,215,0,0.15);
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* HERO SECTION */
  .hero {
    background: linear-gradient(135deg, var(--purple) 0%, var(--dark) 100%);
    padding: 40px 24px 30px;
    text-align: center;
    border-bottom: 1px solid rgba(255,215,0,0.2);
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: -30px;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, rgba(11,110,79,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }

  .avatar {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--teal), var(--purple));
    border-radius: 50%;
    border: 3px solid var(--yellow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 16px;
    position: relative;
    z-index: 1;
  }

  .online-dot {
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 14px;
    height: 14px;
    background: #39FF14;
    border-radius: 50%;
    border: 2px solid var(--charcoal);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.2); }
  }

  .hero h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .hero h2 span { color: var(--yellow); }

  .hero p {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    max-width: 320px;
    margin: 0 auto 20px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  /* QUICK TOPICS */
  .quick-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .topic-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .topic-btn:hover, .topic-btn:active {
    background: var(--yellow);
    color: var(--purple);
    border-color: var(--yellow);
    transform: translateY(-1px);
  }

  /* CHAT AREA */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
  }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.nathy {
    background: linear-gradient(135deg, var(--purple), var(--teal));
    border: 2px solid var(--yellow);
  }

  .msg-avatar.user-av {
    background: var(--orange);
    font-size: 13px;
    font-weight: 700;
    color: white;
    font-family: 'Poppins', sans-serif;
  }

  .msg-bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.7;
    position: relative;
  }

  .message.nathy .msg-bubble {
    background: linear-gradient(135deg, #1e1248, #0f2333);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 4px 18px 18px 18px;
    color: rgba(255,255,255,0.92);
  }

  .message.user .msg-bubble {
    background: linear-gradient(135deg, var(--teal), #0a5a40);
    border-radius: 18px 4px 18px 18px;
    color: var(--white);
  }

  .msg-name {
    font-size: 10px;
    font-weight: 600;
    color: var(--yellow);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .msg-bubble strong { color: var(--yellow); }
  .msg-bubble em { color: rgba(255,215,0,0.8); font-style: normal; }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--yellow);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* INPUT AREA */
  .input-area {
    background: var(--dark);
    border-top: 1px solid rgba(255,215,0,0.15);
    padding: 14px 16px;
    position: sticky;
    bottom: 0;
  }

  .input-wrapper {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,215,0,0.25);
    border-radius: 14px;
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-size: 13.5px;
    padding: 11px 16px;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: rgba(255,255,255,0.35); }
  textarea:focus { border-color: var(--yellow); }

  .send-btn {
    background: var(--yellow);
    border: none;
    border-radius: 12px;
    width: 46px;
    height: 46px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--orange); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 20px; height: 20px; fill: var(--purple); }

  .input-hint {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 8px;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
  }

  /* CTA CARD */
  .cta-card {
    background: linear-gradient(135deg, var(--purple), var(--dark));
    border: 1.5px solid var(--yellow);
    border-radius: 14px;
    padding: 16px;
    margin-top: 8px;
  }

  .cta-card h4 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1.5px;
    color: var(--yellow);
    margin-bottom: 6px;
  }

  .cta-card p {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .cta-card a {
    display: inline-block;
    background: var(--yellow);
    color: var(--purple);
    font-weight: 700;
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 8px;
    text-decoration: none;
    letter-spacing: 0.5px;
  }

  /* SCROLLBAR */
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 2px; }

  /* ERROR */
  .error-bubble {
    background: rgba(255,77,109,0.15);
    border: 1px solid var(--coral);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--coral);
    text-align: center;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-badge">K2Ç</div>
    <div class="logo-text">
      <h1>K2Ç ACADEMY</h1>
      <p>KNOWLEDGE TO CASH</p>
    </div>
  </div>
  <div class="header-tag">ASK NATHY AI</div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="avatar">
    🎓
    <div class="online-dot"></div>
  </div>
  <h2>ASK <span>DIGITAL NATHY</span></h2>
  <p>Get instant answers about the course, K2Ç Academy and how to start earning from what you know.</p>
  <div class="quick-topics">
    <button class="topic-btn" onclick="askTopic('Who is Digital Nathy?')">👤 Who is Nathy?</button>
    <button class="topic-btn" onclick="askTopic('What is the Zero to First Online Sale System course about?')">🎓 The Course</button>
    <button class="topic-btn" onclick="askTopic('How much does the course cost and what do I get?')">💰 Pricing</button>
    <button class="topic-btn" onclick="askTopic('What will I be able to do after completing this course?')">🏆 Results</button>
    <button class="topic-btn" onclick="askTopic('Is this course right for a complete beginner with no experience?')">🌱 Beginners</button>
    <button class="topic-btn" onclick="askTopic('What bonuses come with the course?')">🎁 Bonuses</button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-container" id="chatContainer"></div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="userInput"
      placeholder="Ask anything about Digital Nathy, K2Ç Academy or the course..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Powered by K2Ç Academy AI · Responses are based on Digital Nathy's real story and course content</p>
</div>
<script>
/**
 * K2Ç ACADEMY ROBUST ENGINE
 */

// 1. Configuration & Links
const COURSE_URL = "https://oniahemmanuel.systeme.io/da36229f";
const WHATSAPP_NUMBER = "2349164266235"; // REPLACE THIS with your actual number (no + or 0)
const PRELOADED_MSG = encodeURIComponent("Hello Digital Nathy, I'm interested in the K2Ç Academy. I'd like to ask a few questions before I enroll.");
const WHATSAPP_LINK = `https://wa.me/${WHATSAPP_NUMBER}?text=${PRELOADED_MSG}`;

// 2. Knowledge Base with Regex Patterns
const KNOWLEDGE_BASE = [
  {
    pattern: /(who|nathy|founder|onniah|owner|creator)/i,
    response: "I'm Oniah Emmanuel, popularly known as **Digital Nathy**. \n\nI’m a digital marketing strategist and the founder of K2Ç Academy. My story isn't one of 'overnight success.' I struggled, failed, and was even embarrassed in front of 200 people before I figured out the **Knowledge to Cash** system. Now, I help others skip the struggle."
  },
  {
    pattern: /(price|cost|how much|amount|fee|naira|pay|payment|buy|purchase|enroll|join)/i,
    response: `The **Zero to First Online Sale System** is currently at an Early Bird price of **₦9,997** for the first 20 students. \n\nAfter that, the price goes up to **₦15,000**. \n\n**Ready to start?** \n[CLICK HERE TO ENROLL INSTANTLY](${COURSE_URL})`
  },
  {
    pattern: /(beginner|newbie|start|no experience|don't know|first time|laptop|computer)/i,
    response: "You don't need a laptop or previous experience. If you can use WhatsApp and TikTok, you have everything you need. This course is a step-by-step 'hold-you-by-the-hand' guide for beginners in Nigeria."
  },
  {
    pattern: /(bonus|extra|freebies|gift|added|community|group)/i,
    response: "You're getting over **₦50,000** worth of bonuses for free: \n• The Quick Start Action Guide \n• Done-For-You Swipe Files \n• 30-Day Content Calendar \n• Lifetime WhatsApp Community Access \n• Personal Product Review (First 15 students only!)."
  },
  {
    pattern: /(learn|module|teach|inside|content|curriculum|what is in)/i,
    response: "We cover 7 modules: Mindset, The Knowledge Audit (finding what to sell), The Clarity Blueprint, Creating your digital product in 48 hours, The WhatsApp Sales Machine, The 7-Day Launch Plan, and Scaling your income."
  },
  {
    pattern: /(whatsapp|chat|talk|call|phone|contact|speak|personally)/i,
    response: `I love your energy! If you'd like to chat with me or my team personally on WhatsApp, click the link below: \n\n[CHATS WITH NATHY ON WHATSAPP](${WHATSAPP_LINK})`
  },
  {
    pattern: /(scam|real|work|legit|proof|result|evidence)/i,
    response: "I value integrity over hype. K2Ç stands for **Knowledge to Cash**—we teach real skills, not 'get rich quick' schemes. I show my real Selar and international payouts inside the course. It works if you work it!"
  }
];

const DEFAULT_RESPONSE = "That's a great point! To give you the best answer, could you clarify if you're asking about the **course price**, **how to start as a beginner**, or if you want to **chat on WhatsApp**? \n\nYou can also click the buttons above!";

let chatCount = 0;

/**
 * UI & LOGIC HANDLERS
 */
function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();

  if (!text) return;

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  showTyping();

  setTimeout(() => {
    removeTyping();
    const reply = findResponse(text);
    addMessage('nathy', reply);
    sendBtn.disabled = false;
    
    chatCount++;
    if (chatCount % 3 === 0) showCTA();
  }, 900);
}

function findResponse(input) {
  for (let item of KNOWLEDGE_BASE) {
    if (item.pattern.test(input)) {
      return item.response;
    }
  }
  return DEFAULT_RESPONSE;
}

function addMessage(role, content) {
  const container = document.getElementById('chatContainer');
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${role}`;
  
  const avatar = role === 'nathy' ? '🎓' : 'YOU';
  const nameLabel = role === 'nathy' ? '<div class="msg-name">DIGITAL NATHY</div>' : '';
  
  msgDiv.innerHTML = `
    <div class="msg-avatar ${role === 'nathy' ? 'nathy' : 'user-av'}">${avatar}</div>
    <div class="msg-bubble">
      ${nameLabel}
      <div>${formatText(content)}</div>
    </div>
  `;
  
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br/>')
    .replace(/\[(.*?)\]\((.*?)\)/g, `<a href="$2" target="_blank" style="color:var(--yellow); font-weight:bold; text-decoration:underline;">$1</a>`);
}

function showTyping() {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'message nathy';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar nathy">🎓</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showCTA() {
  const container = document.getElementById('chatContainer');
  const card = document.createElement('div');
  card.className = 'cta-card';
  card.innerHTML = `
    <h4>SECURE YOUR FUTURE</h4>
    <p>Join the Zero to First Online Sale System today and get all bonuses worth ₦50,000+.</p>
    <a href="${COURSE_URL}" target="_blank">GET INSTANT ACCESS →</a>
  `;
  container.appendChild(card);
  container.scrollTop = container.scrollHeight;
}

function askTopic(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

window.onload = () => {
  setTimeout(() => {
    addMessage('nathy', "Welcome to the Academy! 🎓\n\nI'm the Digital Nathy AI. Are you ready to stop just learning and start earning from what you know? \n\nAsk me anything about the course or how to get started!");
  }, 500);
};

</script>
</body>
</html>
